<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day in a Life</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --text: #f0f0ff;
      --text2: #8888aa;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --blue: #3b82f6;
      --pink: #ec4899;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes firePulse {
      0%, 100% { filter: drop-shadow(0 0 6px #f59e0b); transform: scale(1); }
      50% { filter: drop-shadow(0 0 14px #f59e0b); transform: scale(1.08); }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(124,58,237,0.3); }
      50% { box-shadow: 0 0 30px rgba(124,58,237,0.6); }
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes checkBounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .fade-up { animation: fadeUp 0.4s ease both; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Login Screen ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      background: radial-gradient(ellipse at top, #1a0a2e 0%, #0a0a0f 60%);
    }
    .login-logo { font-size: 72px; margin-bottom: 24px; animation: firePulse 2s ease infinite; }
    .login-title {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .login-sub { font-size: 15px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
    .login-features {
      list-style: none;
      margin-bottom: 40px;
      text-align: left;
      width: 100%;
      max-width: 280px;
    }
    .login-features li {
      font-size: 14px;
      color: var(--text2);
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .login-features li span:first-child { font-size: 18px; }
    .google-btn {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s;
    }
    .google-btn:hover { background: var(--surface2); border-color: var(--accent); }
    .google-btn:active { transform: scale(0.97); }
    .google-icon { font-size: 20px; }
    .login-note { font-size: 11px; color: var(--text2); margin-top: 16px; opacity: 0.6; }

    /* ── Loading ── */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 14px; color: var(--text2); }

    /* ── Header ── */
    .header {
      padding: 16px 16px 0;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      object-fit: cover;
    }
    .user-avatar-fallback {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .user-name { font-size: 13px; font-weight: 600; }
    .sync-indicator {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
    .sync-dot.syncing { background: var(--gold); animation: pulse 1s ease infinite; }
    .sync-dot.error { background: var(--red); }
    .sync-text { color: var(--text2); }
    .logout-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Streak Banner ── */
    .streak-banner {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 20px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      animation: glow 3s ease infinite;
    }
    .streak-left { display: flex; align-items: center; gap: 12px; }
    .streak-fire { font-size: 34px; animation: firePulse 2s ease infinite; display: block; line-height: 1; }
    .streak-count {
      font-size: 30px;
      font-weight: 900;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .streak-label { font-size: 10px; color: var(--text2); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .streak-right { text-align: right; }
    .streak-best { font-size: 11px; color: var(--text2); }
    .streak-best span { color: var(--gold); font-weight: 700; }
    .xp-badge {
      margin-top: 5px;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent2);
    }

    /* ── Progress Ring ── */
    .progress-section {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px 12px;
    }
    .progress-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .progress-ring-wrap svg { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
    .progress-ring-fill {
      fill: none; stroke-width: 6; stroke-linecap: round;
      stroke: url(#progressGrad);
      transition: stroke-dashoffset 0.6s ease;
    }
    .progress-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .progress-pct { font-size: 16px; font-weight: 800; color: var(--text); }
    .progress-done { font-size: 9px; color: var(--text2); font-weight: 600; }
    .progress-info { flex: 1; }
    .progress-title { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .progress-subtitle { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .motivational-msg { font-size: 12px; color: var(--accent2); font-style: italic; margin-top: 4px; font-weight: 500; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      font-family: inherit;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent2); }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }

    /* ── Main ── */
    .main { flex: 1; padding: 0 16px 90px; overflow-y: auto; }

    /* ── Task Card ── */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.done { border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.05); }
    .task-card.done::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--green);
      border-radius: 3px 0 0 3px;
    }
    .task-emoji { font-size: 28px; flex-shrink: 0; line-height: 1; }
    .task-info { flex: 1; min-width: 0; }
    .task-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .task-card.done .task-name { color: var(--text2); text-decoration: line-through; }
    .task-desc { font-size: 12px; color: var(--text2); line-height: 1.3; }
    .task-xp {
      font-size: 11px; font-weight: 700; color: var(--accent2);
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; padding: 2px 8px; flex-shrink: 0;
    }
    .task-check {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
      font-size: 16px;
    }
    .task-card.done .task-check {
      background: var(--green); border-color: var(--green);
      animation: checkBounce 0.4s ease;
    }

    .section-label {
      font-size: 11px; font-weight: 700; color: var(--text2);
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 8px 4px 6px;
    }

    /* ── Toast ── */
    .reward-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; padding: 10px 20px; border-radius: 50px;
      font-size: 14px; font-weight: 700; z-index: 999;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 32px rgba(124,58,237,0.5);
      white-space: nowrap;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; border-radius: 2px;
      animation: confetti-fall linear forwards;
      pointer-events: none; z-index: 998;
    }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; text-align: center;
      animation: fadeUp 0.4s ease both;
    }
    .stat-icon { font-size: 28px; margin-bottom: 8px; }
    .stat-value {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, var(--accent2), var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 2px; }

    .heatmap-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
      animation: fadeUp 0.5s ease both;
    }
    .heatmap-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .heatmap-subtitle { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
    .heatmap-grid { display: flex; gap: 3px; flex-wrap: wrap; }
    .heatmap-cell { width: 14px; height: 14px; border-radius: 3px; transition: transform 0.2s; }
    .heatmap-cell:hover { transform: scale(1.3); }
    .heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 10px; }
    .heatmap-legend span { font-size: 10px; color: var(--text2); }

    .period-tabs {
      display: flex; gap: 6px; margin-bottom: 16px;
      overflow-x: auto; padding-bottom: 2px;
    }
    .period-tab {
      flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .period-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .achievements-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
    }
    .achievement-list { display: flex; flex-direction: column; gap: 10px; }
    .achievement-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px; border-radius: 12px; background: var(--surface2);
    }
    .achievement-item.locked { opacity: 0.4; filter: grayscale(1); }
    .ach-icon { font-size: 24px; }
    .ach-info { flex: 1; }
    .ach-name { font-size: 13px; font-weight: 700; }
    .ach-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .ach-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
      background: rgba(245,158,11,0.2); color: var(--gold); border: 1px solid rgba(245,158,11,0.3);
    }

    /* ── Share ── */
    .share-page { padding: 16px 0; }
    .share-preview { border-radius: 20px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .share-canvas { width: 100%; display: block; border-radius: 20px; }
    .share-btn {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: linear-gradient(135deg, #e1306c, #f77737);
      color: white; font-size: 16px; font-weight: 700; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px; transition: transform 0.2s, opacity 0.2s;
    }
    .share-btn:active { transform: scale(0.97); opacity: 0.9; }
    .share-btn.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .share-tip { font-size: 12px; color: var(--text2); text-align: center; margin-top: 8px; }

    /* ── Completion ── */
    .completion-screen {
      position: fixed; inset: 0;
      background: rgba(10,10,15,0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 200; animation: fadeUp 0.4s ease;
      text-align: center; padding: 32px;
    }
    .completion-emoji { font-size: 80px; animation: pop 0.6s ease; margin-bottom: 16px; }
    .completion-title {
      font-size: 28px; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--gold), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .completion-sub { font-size: 15px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
    .completion-btn {
      padding: 14px 32px; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
    }

    .level-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.15));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 700; color: var(--gold);
    }

    .daily-progress-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
    .daily-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--pink));
      border-radius: 2px; transition: width 0.6s ease;
    }

    .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 8px; }
    .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .chart-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      transition: height 0.6s ease; min-height: 2px;
    }
    .chart-bar-label { font-size: 9px; color: var(--text2); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey: "__FIREBASE_API_KEY__",
    authDomain: "__FIREBASE_AUTH_DOMAIN__",
    projectId: "__FIREBASE_PROJECT_ID__",
    storageBucket: "__FIREBASE_STORAGE_BUCKET__",
    messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
    appId: "__FIREBASE_APP_ID__",
    measurementId: "__FIREBASE_MEASUREMENT_ID__"
  };
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db = firebase.firestore();
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Constants ────────────────────────────────────────────────────────────────

const TASKS = [
  { id: 0, emoji: "🥑", name: "Fat First Morning",       desc: "Start with healthy fats — avocado, nuts, or eggs",          xp: 10, time: "Morning"   },
  { id: 1, emoji: "🥚", name: "Protein Rich Breakfast",  desc: "High protein fuel to kickstart the day right",               xp: 10, time: "Morning"   },
  { id: 2, emoji: "👟", name: "2K Steps",                desc: "Morning walk to wake up the body",                           xp: 10, time: "Morning"   },
  { id: 3, emoji: "📚", name: "Interview Prep",          desc: "30 min of study — DSA, system design, or behaviorals",       xp: 15, time: "Morning"   },
  { id: 4, emoji: "🥗", name: "Protein & Fiber Lunch",   desc: "Balanced lunch — lean protein + greens + legumes",           xp: 10, time: "Afternoon" },
  { id: 5, emoji: "🚶", name: "3K Steps",                desc: "Post-lunch walk to aid digestion",                           xp: 10, time: "Afternoon" },

// ─── Utils ────────────────────────────────────────────────────────────────────

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function getLevel(xp) {
  const levels = [
    { min: 0,    name: "Seedling 🌱" },
    { min: 100,  name: "Sprout 🪴"   },
    { min: 300,  name: "Hustler 💥"  },
    { min: 600,  name: "Warrior ⚔️"  },
    { min: 1000, name: "Champion 🏆" },
    { min: 2000, name: "Legend 👑"   },
  ];
  return [...levels].reverse().find(l => xp >= l.min) || levels[0];
}

function calcStreak(history) {
  const today = todayKey();
  let streak = 0;
  let check = today;
  while (true) {
    const day = history[check];
    if (!day) break;
    const completed = (day.tasks || []).filter(Boolean).length;
    if (completed < TASKS.length) break;
    streak++;
    const d = new Date(check + 'T00:00:00');
    d.setDate(d.getDate() - 1);
    check = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return streak;
}

function calcLongestStreak(history) {
  const days = Object.keys(history).sort();
  let max = 0, cur = 0, prev = null;
  for (const d of days) {
    const done = (history[d].tasks || []).filter(Boolean).length >= TASKS.length;
    if (done) {
      if (prev) {
        const diff = (new Date(d + 'T00:00:00') - new Date(prev + 'T00:00:00')) / 86400000;
        cur = diff === 1 ? cur + 1 : 1;
      } else cur = 1;
      max = Math.max(max, cur);
      prev = d;
    } else { cur = 0; prev = null; }
  }
  return max;
}

function userDoc(uid) {
  return db.collection('users').doc(uid).collection('data').doc('tracker');
}

async function loadFromFirestore(uid) {
  const snap = await userDoc(uid).get();
  return snap.exists ? (snap.data().history || {}) : {};
}

async function saveToFirestore(uid, history) {
  await userDoc(uid).set({ history }, { merge: true });
}

function Heatmap({ history, days }) {
  const today = todayKey();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const completed = (history[key]?.tasks || []).filter(Boolean).length;
    const pct = completed / TASKS.length;
    const color = completed === 0 ? '#1c1c27' : pct < 0.3 ? '#2d1b69' : pct < 0.6 ? '#5b21b6' : pct < 1 ? '#7c3aed' : '#10b981';
    cells.push(
      <div key={key} className="heatmap-cell"
        title={`${key}: ${completed}/${TASKS.length}`}
        style={{ background: color, border: key === today ? '2px solid #a855f7' : 'none' }} />
    );
  }
  return (
    <div>
      <div className="heatmap-grid">{cells}</div>
      <div className="heatmap-legend">
        <span>Less</span>
        {['#1c1c27','#2d1b69','#5b21b6','#7c3aed','#10b981'].map((c,i) => (
          <div key={i} style={{ width: 12, height: 12, borderRadius: 3, background: c }} />
        ))}
        <span>More</span>
      </div>
    </div>
  );
}

function SharePage({ history, streak, user }) {
  const canvasRef = useRef(null);
  const today = todayKey();
  const tasks = history[today]?.tasks || [];
  const completed = tasks.filter(Boolean).length;
  const totalXP = Object.values(history).reduce((s, d) => s + (d.xp || 0), 0);
  const level = getLevel(totalXP);

  useEffect(() => { drawCard(); }, [history, streak]);

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function drawCard() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const W = 1080, H = 1080;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0a0a0f'); bg.addColorStop(0.5,'#0d0a1a'); bg.addColorStop(1,'#050510');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    ctx.save(); ctx.globalAlpha = 0.08;
    const g1 = ctx.createRadialGradient(200,200,0,200,200,400);
    g1.addColorStop(0,'#7c3aed'); g1.addColorStop(1,'transparent');
    ctx.fillStyle = g1; ctx.fillRect(0,0,W,H);
    const g2 = ctx.createRadialGradient(900,900,0,900,900,500);
    g2.addColorStop(0,'#ec4899'); g2.addColorStop(1,'transparent');
    ctx.fillStyle = g2; ctx.fillRect(0,0,W,H);
    ctx.restore();

    // Badge
    ctx.fillStyle = 'rgba(124,58,237,0.2)';
    roundRect(ctx, W/2-140, 60, 280, 60, 30); ctx.fill();
    ctx.strokeStyle = 'rgba(168,85,247,0.5)'; ctx.lineWidth = 2;
    roundRect(ctx, W/2-140, 60, 280, 60, 30); ctx.stroke();
    ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#a855f7';
    ctx.textAlign = 'center'; ctx.fillText('DAY IN A LIFE', W/2, 97);

    ctx.font = '22px sans-serif'; ctx.fillStyle = '#6666aa';
    ctx.fillText(formatDate(today), W/2, 160);

    ctx.font = 'bold 90px sans-serif'; ctx.fillStyle = '#f59e0b';
    ctx.fillText(`🔥 ${streak}`, W/2, 290);
    ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = '#8888aa';
    ctx.fillText('DAY STREAK', W/2, 340);

    ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#a855f7';
    ctx.fillText(level.name, W/2, 390);

    // Ring
    const cx = W/2, cy = 530, radius = 100;
    const pct = completed / TASKS.length;
    ctx.strokeStyle = '#1c1c27'; ctx.lineWidth = 16;
    ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.stroke();
    if (pct > 0) {
      const grad = ctx.createLinearGradient(cx-radius,cy,cx+radius,cy);
      grad.addColorStop(0,'#7c3aed'); grad.addColorStop(1,'#ec4899');
      ctx.strokeStyle = grad; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(cx,cy,radius,-Math.PI/2,-Math.PI/2+Math.PI*2*pct); ctx.stroke();
    }
    ctx.font = 'bold 56px sans-serif'; ctx.fillStyle = '#f0f0ff';
    ctx.fillText(`${completed}/${TASKS.length}`, cx, cy+20);
    ctx.font = '20px sans-serif'; ctx.fillStyle = '#6666aa';
    ctx.fillText("today's tasks", cx, cy+52);

    // Task grid
    const taskY = 680, colW = 480;
    TASKS.forEach((t, i) => {
      const col = i < 5 ? 0 : 1;
      const row = i < 5 ? i : i-5;
      const x = col===0 ? 120 : W/2+40, y = taskY + row*56;
      const done = tasks[i];
      ctx.fillStyle = done ? 'rgba(16,185,129,0.15)' : 'rgba(28,28,39,0.6)';
      roundRect(ctx,x,y,colW,46,12); ctx.fill();
      if (done) { ctx.strokeStyle='rgba(16,185,129,0.4)'; ctx.lineWidth=1.5; roundRect(ctx,x,y,colW,46,12); ctx.stroke(); }
      ctx.font = '26px serif'; ctx.textAlign = 'left'; ctx.fillText(t.emoji, x+12, y+32);
      ctx.font = done ? 'bold 18px sans-serif' : '18px sans-serif';
      ctx.fillStyle = done ? '#10b981' : '#6666aa';
      ctx.fillText(t.name, x+52, y+31);
      if (done) { ctx.font='bold 20px sans-serif'; ctx.fillStyle='#10b981'; ctx.textAlign='right'; ctx.fillText('✓',x+colW-14,y+32); }
    });

    ctx.font='20px sans-serif'; ctx.fillStyle='rgba(102,102,170,0.6)';
    ctx.textAlign='center'; ctx.fillText('Built my best day 💜', W/2, H-40);
  }

  function download() {
    const link = document.createElement('a');
    link.download = `dayinalife-${today}.png`;
    link.href = canvasRef.current.toDataURL('image/png');
    link.click();
  }
  function copyToClipboard() {
    canvasRef.current.toBlob(blob => {
      try {
        navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        alert('Copied! Paste into Instagram Stories 📸');
      } catch { download(); }
    });
  }

  return (
    <div className="share-page">
      <div className="section-label">Share Your Progress</div>
      <div className="share-preview">
        <canvas ref={canvasRef} className="share-canvas" />
      </div>
      <button className="share-btn" onClick={copyToClipboard}><span>📸</span> Copy for Instagram</button>
      <button className="share-btn secondary" onClick={download}><span>💾</span> Save Image</button>
      <p className="share-tip">Download → Open Instagram → Add to Stories or Feed</p>
    </div>
  );
}

            ))}

        </div>

      <div className="achievements-section">

  );

function App() {
  const [user, setUser] = useState(undefined);   // undefined = loading, null = logged out
  const [history, setHistory] = useState({});
  const [syncState, setSyncState] = useState('synced'); // 'synced' | 'syncing' | 'error'
  const [tab, setTab] = useState('today');
  const [toast, setToast] = useState(null);
  const [showCompletion, setShowCompletion] = useState(false);
  const toastTimer = useRef(null);
  const saveTimer = useRef(null);

  // Auth listener + handle redirect result
  useEffect(() => {
    auth.getRedirectResult().catch(e => console.error('Redirect error:', e));
    const unsub = auth.onAuthStateChanged(async u => {
      setUser(u || null);
      if (u) {
        setSyncState('syncing');
        try {
          const data = await loadFromFirestore(u.uid);
          setHistory(data);
          setSyncState('synced');
        } catch (e) {
          console.error(e);
          setSyncState('error');
        }
      }
    });
    return unsub;
  }, []);

  // Debounced Firestore save
  function scheduleSave(uid, newHistory) {
    setSyncState('syncing');
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await saveToFirestore(uid, newHistory);
        setSyncState('synced');
      } catch (e) {
        console.error(e);
        setSyncState('error');
      }
    }, 800);
  }

  function showToast(msg) {
    if (toastTimer.current) clearTimeout(toastTimer.current);
    setToast(msg);
    toastTimer.current = setTimeout(() => setToast(null), 2500);
  }

  function handleToggle(taskId) {
    const today = todayKey();
    setHistory(prev => {
      const day = prev[today] || { tasks: Array(TASKS.length).fill(false), xp: 0 };
      const tasks = [...(day.tasks || Array(TASKS.length).fill(false))];
      while (tasks.length < TASKS.length) tasks.push(false);
      const wasFull = tasks.filter(Boolean).length === TASKS.length;
      tasks[taskId] = !tasks[taskId];
      const nowDone = tasks.filter(Boolean).length;
      const fullDay = nowDone === TASKS.length;
      const xp = tasks.reduce((s,v,i) => s+(v?TASKS[i].xp:0), 0) + (fullDay ? 50 : 0);
      if (tasks[taskId]) showToast(`+${TASKS[taskId].xp} XP — ${TASKS[taskId].name} done! 🎉`);
      if (!wasFull && fullDay) setTimeout(() => setShowCompletion(true), 400);
      const updated = { ...prev, [today]: { ...day, tasks, xp } };
      scheduleSave(user.uid, updated);
      return updated;
    });
  }

  async function handleLogout() {
    await auth.signOut();
    setHistory({});
    setUser(null);
  }

  const streak = calcStreak(history);
  const longest = calcLongestStreak(history);
  const totalXP = Object.values(history).reduce((s,d) => s+(d.xp||0), 0);

  // Loading
  if (user === undefined) {
    return (
      <div className="loading-screen">
        <div className="loading-spinner" />
        <div className="loading-text">Loading…</div>
      </div>
    );
  }

  // Not logged in
  if (!user) return <LoginScreen />;

  const syncLabel = syncState==='syncing' ? 'Syncing…' : syncState==='error' ? 'Sync error' : 'Synced';

  return (
    <div className="app">
      {toast && <div className="reward-toast">{toast}</div>}

      <div className="header">
        {/* User row */}
        <div className="user-row">
          <div className="user-info">
            {user.photoURL
              ? <img className="user-avatar" src={user.photoURL} alt="" />
              : <div className="user-avatar-fallback">{(user.displayName||'U')[0]}</div>}
            <div>
              <div className="user-name">{user.displayName?.split(' ')[0] || 'Hey!'}</div>
              <div className="sync-indicator">
                <div className={`sync-dot${syncState==='syncing'?' syncing':syncState==='error'?' error':''}`} />
                <span className="sync-text">{syncLabel}</span>
              </div>
            </div>
          </div>
          <button className="logout-btn" onClick={handleLogout}>Sign out</button>
        </div>

        {/* Streak Banner */}
        <div className="streak-banner">
          <div className="streak-left">
            <span className="streak-fire">🔥</span>
            <div>
              <div className="streak-count">{streak}</div>
              <div className="streak-label">Day Streak</div>
            </div>
          </div>
          <div className="streak-right">
            <div className="streak-best">Best: <span>{longest}</span> days</div>
            <div className="xp-badge">⚡ {totalXP} XP</div>
            <div style={{fontSize:11,color:'#6666aa',marginTop:4}}>{formatDate(todayKey())}</div>
          </div>
        </div>
      </div>

      {tab==='today' && (
        <TodayPage history={history} onToggle={handleToggle}
          showCompletion={showCompletion} onDismissCompletion={() => setShowCompletion(false)} />
      )}
      {tab==='stats' && <div style={{padding:'0 16px 90px'}}><StatsPage history={history} /></div>}
      {tab==='share' && <div style={{padding:'0 16px 90px'}}><SharePage history={history} streak={streak} user={user} /></div>}

      <div className="bottom-nav">
        {[['today','☀️','Today'],['stats','📊','Stats'],['share','📸','Share']].map(([id,icon,label]) => (
          <button key={id} className={`nav-item${tab===id?' active':''}`} onClick={() => setTab(id)}>
            <span className="nav-icon">{icon}</span>
            <span className="nav-label">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
